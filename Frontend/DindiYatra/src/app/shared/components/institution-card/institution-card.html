<div class="institution-card">
    <img [src]="'assets/images/institution-card-img.jpeg'" alt="">
    <div class="info">
        <h2>Kedarnath Yatra</h2>
        <div class="location">
            <span>Nagpur, Maharashtra</span>
        </div>

        @if(isInfo()){
        <div class="members">
            <img [src]="'assets/icons/members.png'" alt="members">
            <span>1200+ Members</span>
        </div>

        <app-button [bw]="'100%'" [title]="'View Details'" [isPrimary]="false" (click)="goToDetails()" />
        }
    </div>
</div>
