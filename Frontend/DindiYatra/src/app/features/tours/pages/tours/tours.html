<div class="tours">
    <app-sidebar />

    <div class="main-container">
        <app-title [title]="'Tours'" [fs]="'25px'" [nestedNav]="nestedNav" />

        <app-tabs [tabs]="tabs" (tabChanged)="onTabChanged($event)" />

        @if (selectedTab() == upcoming) {
            <app-upcoming-tab />
        }

        @if (selectedTab() == completed) {
            <app-completed-tab />
        }
    </div>

</div>
